name: ${COMPOSE_PROJECT_NAME:-whiskey}

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: whiskey
      POSTGRES_PASSWORD: password
      POSTGRES_DB: whiskey
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whiskey"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (Session Store)
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # LocalStack (S3 Emulation)
  localstack:
    image: localstack/localstack
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=ap-northeast-1
    volumes:
      - localstack-data:/var/lib/localstack
      - ./docker/localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Mailpit (ローカルメール確認用)
  mailpit:
    image: axllent/mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Go Backend API
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.dev
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
      - go-mod-cache:/go/pkg/mod
    environment:
      - DATABASE_URL=postgresql://whiskey:password@db:5432/whiskey?sslmode=disable
      - REDIS_URL=redis:6379
      - PORT=8080
      - ENV=development
      - S3_ENDPOINT=http://localstack:4566
      - S3_EXTERNAL_ENDPOINT=http://localhost:4566
      - S3_REGION=ap-northeast-1
      - S3_BUCKET=whiskey-avatars
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    command: air -c .air.toml

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile.dev
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
      - "${STORYBOOK_PORT:-6006}:6006"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-8080}
    depends_on:
      - backend

volumes:
  postgres-data:
  go-mod-cache:
  redis-data:
  localstack-data:
